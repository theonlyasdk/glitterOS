<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>glitterOS</title>

	<!-- Preloading Critical Assets -->
	<link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" as="style"
		crossorigin="anonymous">
	<link rel="preload" href="styles/bs-theme.css" as="style">
	<link rel="preload" href="styles/styles.css" as="style">

	<!-- PWA & Mobile Meta -->
	<meta name="theme-color" content="#1a1a1a">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="glitterOS">

	<!-- Icons -->
	<link rel="icon" type="image/png" sizes="32x32" href="res/icons/favicon-32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="res/icons/favicon-16.png">
	<link rel="apple-touch-icon" href="res/icons/apple-touch-icon.png">
	<link rel="manifest" href="manifest.json">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		crossorigin="anonymous">
	<link rel="stylesheet" href="lib/remix-icons/remixicon.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="styles/theme.css">
	<link rel="stylesheet" href="styles/bs-theme.css">
	<link rel="stylesheet" href="styles/controls.css">
	<link rel="stylesheet" href="styles/desktop.css">
	<link rel="stylesheet" href="styles/fonts.css">
	<link rel="stylesheet" href="styles/menubar.css">
	<link rel="stylesheet" href="styles/window.css">
	<link rel="stylesheet" href="styles/taskbar.css">
	<link rel="stylesheet" href="styles/action-centre.css">
	<link rel="stylesheet" href="styles/search.css">
	<link rel="stylesheet" href="styles/cmd.css">
	<link rel="stylesheet" href="styles/filemanager.css">
	<link rel="stylesheet" href="styles/switcher.css">
	<link rel="stylesheet" href="styles/appmenu.css">
	<link rel="stylesheet" href="styles/notepad.css">
	<link rel="stylesheet" href="styles/widgets.css">
	<link rel="stylesheet" href="styles/filedialog.css">
	<link rel="stylesheet" href="styles/controlpanel.css">
	<link rel="stylesheet" href="styles/edit.css">
	<link rel="stylesheet" href="styles/taskmanager.css">
	<link rel="stylesheet" href="styles/regedit.css">
	<link rel="stylesheet" href="styles/styles.css">
</head>

<body data-bs-theme="dark">
	<div id="app" class="font-roboto">
		<div id="menubar" class="lde-mbar">
			<div class="lde-mbar-left">
				<div class="dropdown">
					<button class="lde-mbar-item" type="button" data-bs-toggle="dropdown" aria-expanded="false"
						title="System Menu">
						<b><i class="bi-balloon-fill"></i></b>
					</button>
					<ul class="dropdown-menu">
						<li><a class="dropdown-item" href="#" onclick="aboutGlitterOS()">About glitterOS</a></li>
						<li>
							<hr class="dropdown-divider">
						</li>
						<li><a class="dropdown-item" href="#" onclick="launchControlPanel()">Control Panel</a></li>
						<li><a class="dropdown-item" href="#">Force Quit Desktop</a></li>
						<li>
							<hr class="dropdown-divider">
						</li>
						<li><a class="dropdown-item" href="#"
								onclick="wm.messageBox('Restart', 'Are you sure you want to restart glitterOS?', { buttons: 'yesno', icon: 'bi-arrow-clockwise', onYes: () => location.reload() })">Restart</a>
						</li>
						<li><a class="dropdown-item" href="#"
								onclick="wm.messageBox('Shut Down', 'Are you sure you want to shut down glitterOS?', { buttons: 'yesno', icon: 'bi-power', onYes: () => { document.body.style.transition = 'opacity 2s'; document.body.style.opacity = '0'; setTimeout(() => location.reload(), 2500); } })">Power
								off...</a></li>
						<li>
							<hr class="dropdown-divider">
						</li>
						<li onclick="kaboom(this)"><a class="dropdown-item" href="#">Kaboom</a></li>
						<li>
							<hr class="dropdown-divider">
						</li>
						<li><a class="dropdown-item" href="#">Lock Screen</a></li>
						<li><a class="dropdown-item" href="#">Log Out</a></li>
					</ul>
				</div>
				<div class="lde-mbar-item">
					<b id="desktop-name">Desktop</b>
				</div>
			</div>
			<div class="lde-mbar-right">
				<div class="dropdown">
					<button class="lde-mbar-item" type="button" title="Calendar" data-bs-toggle="dropdown"
						aria-expanded="false">
						<b id="lde-mbar-applet-date">Calendar</b>
					</button>
					<div class="dropdown-menu p-2" style="min-width: 250px;">
						<div id="calendar-container"></div>
					</div>
				</div>

				<div class="dropdown">
					<button class="lde-mbar-item" type="button" title="Clock" data-bs-toggle="dropdown"
						aria-expanded="false">
						<b id="lde-mbar-applet-time">Clock</b>
					</button>
					<div class="dropdown-menu p-3" style="min-width: 200px;">
						<div class="clock-container">
							<svg class="analog-clock" viewBox="0 0 100 100">
								<circle class="clock-face" cx="50" cy="50" r="45" />
								<g id="clock-markers"></g>
								<line id="hour-hand" class="hand hour" x1="50" y1="50" x2="50" y2="30" />
								<line id="minute-hand" class="hand minute" x1="50" y1="50" x2="50" y2="20" />
								<line id="second-hand" class="hand second" x1="50" y1="50" x2="50" y2="15" />
								<circle class="clock-center" cx="50" cy="50" r="2" />
							</svg>
							<div id="clock-details" class="mt-3 text-center">
								<div id="clock-digital" class="h5 mb-1 fw-bold"></div>
								<div id="clock-timezone" class="small text-secondary"></div>
							</div>
						</div>
					</div>
				</div>
				<button class="lde-mbar-item" id="action-centre-btn" onclick="toggleActionCentre()"
					title="Action Centre">
					<i class="ri-side-bar-line"></i>
				</button>
			</div>
		</div>
		<div id="action-centre-overlay" onclick="closeActionCentre()"
			style="display:none;position:fixed;inset:0;z-index:2999;"></div>
		<div id="action-centre" class="lde-action-centre">
			<div class="lde-ac-header">
				<span>Action Centre</span>
				<span id="ac-date-label" class="lde-ac-date"></span>
			</div>
			<div class="lde-ac-tiles">
				<div class="lde-ac-tile active"><i class="ri-wifi-line"></i><span>Wi-Fi</span></div>
				<div class="lde-ac-tile active"><i class="ri-bluetooth-line"></i><span>Bluetooth</span></div>
				<div class="lde-ac-tile"><i class="ri-plane-line"></i><span>Airplane</span></div>
				<div class="lde-ac-tile active"><i class="ri-moon-clear-line"></i><span>Night Mode</span></div>
				<div class="lde-ac-tile"><i class="ri-battery-2-charge-line"></i><span>Battery Saver</span></div>
				<div class="lde-ac-tile active"><i class="ri-sun-line"></i><span>Brightness</span></div>
			</div>
			<div class="lde-ac-sliders">
				<div class="lde-ac-slider-row">
					<div class="lde-ac-icon-tile" id="ac-vol-btn" data-muted="false" title="Mute/Unmute">
						<i class="ri-volume-up-line"></i>
					</div>
					<input type="range" class="lde-ac-slider" id="ac-vol-slider" value="75">
				</div>
				<div class="lde-ac-slider-row">
					<div class="lde-ac-icon-tile" id="ac-bright-btn" data-toggled="false" title="Toggle Brightness">
						<i class="ri-sun-line"></i>
					</div>
					<input type="range" class="lde-ac-slider" id="ac-bright-slider" value="100">
				</div>
			</div>
		</div>
		<div id="search-panel" class="lde-search-panel" aria-hidden="true">
			<div class="lde-app-list-header">Apps</div>
			<div id="app-list" class="lde-app-list"></div>
			<div class="lde-search-box-wrap">
				<i class="ri-search-line lde-search-icon"></i>
				<input type="text" id="search-input" class="lde-search-input" placeholder="Type here to search"
					autocomplete="off" spellcheck="false">
			</div>
		</div>
		<div id="search-overlay" class="lde-search-overlay"></div>
		<div id="desktop" class="lde-desktop"></div>
		<div id="taskbar" class="lde-taskbar">
			<div id="search-btn" class="lde-taskbar-search-btn" title="Search" onclick="toggleSearch()">
				<i class="ri-search-line"></i>
			</div>
		</div>
	</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	crossorigin="anonymous"></script>
<script src="core/document.js"></script>
<script src="core/lib.js"></script>
<script src="core/wm.js"></script>
<!-- LDE modules (order: globals → applets → menubar → action-centre → fs → apps → search → boot) -->
<script src="core/globals.js"></script>
<script src="core/applets.js"></script>
<script src="core/menubar.js"></script>
<script src="core/action-centre.js"></script>
<script src="core/fs.js"></script>
<script src="core/apps/cmd.js"></script>
<script src="core/apps/filemanager.js"></script>
<script src="core/apps/notepad.js"></script>
<script src="core/filedialog.js"></script>
<script src="core/apps/welcome.js"></script>
<script src="core/apps/edit.js"></script>
<script src="core/apps/controlpanel.js"></script>
<script src="core/apps/taskmanager.js"></script>
<script src="core/apps/regedit.js"></script>
<script src="core/search.js"></script>
<script src="core/switcher.js"></script>
<script src="core/boot.js"></script>
<script>
	if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
		window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW registration failed:', err));
		});
	}
</script>

</html>
